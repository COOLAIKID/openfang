<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sign in — AutoEarn</title>
  <meta name="theme-color" content="#0b0d11" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png" />
  <link rel="icon" href="/static/icons/favicon.png" type="image/png" />
  <style>
    :root{ --bg:#0b0d11; --panel:#161920; --line:#252933; --txt:#e4eaf4; --mut:#7d8898; --acc:#10a37f; --acc2:#1bd39a; --warn:#f87171; }
    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body{ margin:0; height:100%; }
    body{
      background:
        radial-gradient(900px 500px at 50% -10%, rgba(27,211,154,.10), transparent 60%),
        var(--bg);
      color:var(--txt);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      display:flex; align-items:center; justify-content:center; padding:24px;
      min-height:100dvh;
    }
    .card{
      width:100%; max-width:380px; background:var(--panel);
      border:1px solid var(--line); border-radius:20px; padding:30px 26px 26px;
      box-shadow:0 30px 80px rgba(0,0,0,.45);
      animation:rise .5s cubic-bezier(.2,.7,.2,1) both;
    }
    @keyframes rise{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:none;} }
    .logo{ width:56px; height:56px; border-radius:16px; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(145deg,#13231d,#0d130f); border:1px solid var(--line);
      font-size:30px; font-weight:800; color:var(--acc2); margin:0 auto 16px; }
    h1{ font-size:21px; text-align:center; margin:0 0 4px; letter-spacing:-.02em; }
    p.sub{ text-align:center; color:var(--mut); font-size:13.5px; margin:0 0 22px; }
    label{ display:block; font-size:12.5px; color:var(--mut); margin:0 0 7px; }
    input{
      width:100%; padding:14px 15px; border-radius:12px; border:1px solid var(--line);
      background:#0e1116; color:var(--txt); font-size:16px; outline:none; transition:border-color .15s;
    }
    input:focus{ border-color:var(--acc); }
    button{
      width:100%; margin-top:18px; padding:14px; border:0; border-radius:12px; cursor:pointer;
      background:linear-gradient(145deg,var(--acc2),var(--acc)); color:#05140e; font-size:15.5px; font-weight:700;
      transition:transform .08s, filter .15s;
    }
    button:active{ transform:translateY(1px); }
    button:disabled{ filter:grayscale(.4) brightness(.8); cursor:default; }
    .err{ color:var(--warn); font-size:13px; text-align:center; margin-top:14px; min-height:18px; }
    .foot{ text-align:center; color:var(--mut); font-size:11.5px; margin-top:18px; }
  </style>
</head>
<body>
  <form class="card" onsubmit="return signIn(event)">
    <div class="logo">$</div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to your AI money machine</p>
    <label for="pw">Password</label>
    <input id="pw" type="password" autocomplete="current-password" autofocus
           placeholder="Enter your password" />
    <button id="btn" type="submit">Sign in</button>
    <div class="err" id="err"></div>
    <div class="foot">Your workers keep running whether you're here or not.</div>
  </form>
  <script>
    async function signIn(e){
      e.preventDefault();
      const pw = document.getElementById('pw').value;
      const btn = document.getElementById('btn');
      const err = document.getElementById('err');
      err.textContent = ''; btn.disabled = true; btn.textContent = 'Signing in…';
      try{
        const r = await fetch('/api/login', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ password: pw })
        });
        if(r.ok){
          const params = new URLSearchParams(location.search);
          location.href = params.get('next') || '/';
          return false;
        }
        err.textContent = 'That password didn’t work. Try again.';
      }catch(_){
        err.textContent = 'Could not reach the server. Check your connection.';
      }
      btn.disabled = false; btn.textContent = 'Sign in';
      return false;
    }
  </script>
</body>
</html>
